[flake8]
max-line-length = 79
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    .mypy_cache,
    output,
    logs,
    input_raw

[mypy]
python_version = 3.11
ignore_missing_imports = True
disable_error_codes = import-untyped
warn_unused_ignores = False
warn_return_any = False
